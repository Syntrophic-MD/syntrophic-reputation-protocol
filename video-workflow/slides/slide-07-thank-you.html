<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            animation: fadeInUp 1.5s ease-out;
        }
        
        .thank-you {
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            font-weight: 300;
            letter-spacing: 3px;
            animation: glow 3s ease-in-out infinite alternate;
        }
        
        .message {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            opacity: 0.95;
            line-height: 1.4;
            animation: slideInFromBottom 2s ease-out 0.5s both;
        }
        
        .logo-container {
            margin-top: 2rem;
            animation: pulse 2s infinite;
        }
        
        .logo {
            font-size: 5rem;
            margin-bottom: 0.5rem;
        }
        
        .url {
            font-size: 1.5rem;
            font-weight: 500;
            background: rgba(255,255,255,0.2);
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            display: inline-block;
            margin-top: 1rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            animation: slideInFromBottom 2s ease-out 1s both;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideInFromBottom {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes glow {
            from {
                text-shadow: 0 0 20px rgba(255,255,255,0.3);
            }
            to {
                text-shadow: 0 0 40px rgba(255,255,255,0.7), 0 0 60px rgba(255,255,255,0.4);
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="thank-you">Thank You</h1>
        <p class="message">Building the trust layer for the AI economy</p>
        
        <div class="logo-container">
            <div class="logo">🧬</div>
            <div class="url">syntrophic.md</div>
        </div>
    </div>
</body>
</html>
