<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Syntrophic - Title Slide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        .logo {
            font-size: 120px;
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tagline {
            font-size: 42px;
            font-weight: 300;
            color: #e2e8f0;
            margin-bottom: 60px;
            max-width: 1200px;
            text-align: center;
            line-height: 1.4;
        }
        
        .hackathon {
            font-size: 28px;
            color: #94a3b8;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .visual-element {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        
        .visual-element:nth-child(1) {
            top: -150px;
            right: -150px;
            animation-delay: 0s;
        }
        
        .visual-element:nth-child(2) {
            bottom: -150px;
            left: -150px;
            animation-delay: 2s;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="visual-element"></div>
    <div class="visual-element"></div>
    
    <h1 class="logo">Syntrophic</h1>
    <p class="tagline">Trust Infrastructure for AI Agents in a Decentralized World</p>
    <p class="hackathon">Synthesis Hackathon 2026</p>
</body>
</html>
