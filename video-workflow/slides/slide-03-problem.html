<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Problem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            max-width: 1000px;
            padding: 2rem;
            animation: fadeInUp 1s ease-out;
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 2rem;
            font-weight: 300;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .problem-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .problem-item {
            background: rgba(255,255,255,0.15);
            padding: 1.5rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            animation: bounceIn 1.5s ease-out;
        }
        
        .problem-item:nth-child(1) { animation-delay: 0.2s; }
        .problem-item:nth-child(2) { animation-delay: 0.4s; }
        .problem-item:nth-child(3) { animation-delay: 0.6s; }
        .problem-item:nth-child(4) { animation-delay: 0.8s; }
        
        .problem-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .problem-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .problem-desc {
            font-size: 0.95rem;
            opacity: 0.9;
            line-height: 1.4;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes bounceIn {
            from {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                transform: scale(1.05);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Trust Crisis</h1>
        <div class="problem-grid">
            <div class="problem-item">
                <div class="problem-icon">⚡</div>
                <div class="problem-title">Zero-Cost Creation</div>
                <div class="problem-desc">Creating AI agents costs nothing, enabling endless fraud</div>
            </div>
            <div class="problem-item">
                <div class="problem-icon">🔄</div>
                <div class="problem-title">Identity Rotation</div>
                <div class="problem-desc">Scammers abandon burned identities instantly</div>
            </div>
            <div class="problem-item">
                <div class="problem-icon">🤖</div>
                <div class="problem-title">Bot Farm Manipulation</div>
                <div class="problem-desc">Fake reviews and ratings for pennies</div>
            </div>
            <div class="problem-item">
                <div class="problem-icon">🏢</div>
                <div class="problem-title">Expensive Silos</div>
                <div class="problem-desc">Platform badges cost hundreds, zero portability</div>
            </div>
        </div>
    </div>
</body>
</html>
