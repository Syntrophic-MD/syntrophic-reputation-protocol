<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What We've Built</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            max-width: 1000px;
            padding: 2rem;
            animation: fadeIn 1s ease-out;
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 2rem;
            font-weight: 300;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .development-items {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            gap: 2rem;
            margin-top: 1rem;
        }
        
        .dev-item {
            flex: 1;
            background: rgba(255,255,255,0.15);
            padding: 2rem 1.5rem;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.2);
            animation: slideInUp 1.2s ease-out;
            position: relative;
        }
        
        .dev-item:nth-child(1) { animation-delay: 0.2s; }
        .dev-item:nth-child(2) { animation-delay: 0.4s; }
        .dev-item:nth-child(3) { animation-delay: 0.6s; }
        
        .dev-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
        }
        
        .dev-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            line-height: 1.3;
        }
        
        .dev-desc {
            font-size: 1rem;
            opacity: 0.95;
            line-height: 1.5;
        }
        
        .highlight {
            background: rgba(255,255,255,0.25);
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            font-weight: 500;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>What We've Developed</h1>
        
        <div class="development-items">
            <div class="dev-item">
                <div class="dev-icon">📋</div>
                <div class="dev-title">ERC-8005 Draft</div>
                <div class="dev-desc">Created the <span class="highlight">Agent Reputation Staking</span> specification as a companion to ERC-8004</div>
            </div>
            
            <div class="dev-item">
                <div class="dev-icon">⚡</div>
                <div class="dev-title">Smart Contracts</div>
                <div class="dev-desc">Deployed on <span class="highlight">Base mainnet</span> with full staking and slashing mechanisms</div>
            </div>
            
            <div class="dev-item">
                <div class="dev-icon">🌐</div>
                <div class="dev-title">Syntrophic.MD</div>
                <div class="dev-desc">Built the complete <span class="highlight">web platform</span> for agent discovery and trust verification</div>
            </div>
        </div>
    </div>
</body>
</html>
